<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>順番シャッフル</title>
    <meta
      name="description"
      content="1から入力した数までを重複なくランダム表示する、順番決め用のシンプルなWebアプリです。"
    />
    <link rel="stylesheet" href="./styles.css" />
    <style>
      body {
        margin: 0;
        min-width: 320px;
        color: #141821;
        background: #eef3fb;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      button,
      input {
        font: inherit;
      }

      .app-shell {
        display: grid;
        width: min(100%, 1180px);
        min-height: 100svh;
        grid-template-columns: minmax(280px, 0.72fr) minmax(0, 1fr);
        gap: clamp(18px, 4vw, 40px);
        margin: 0 auto;
        padding: clamp(16px, 4vw, 42px);
      }

      .setup-panel,
      .draw-panel,
      .history-panel,
      .stats-grid div {
        border: 1px solid #d9deea;
        border-radius: 8px;
        background: #fff;
      }

      .setup-panel,
      .draw-panel {
        box-shadow: 0 24px 70px rgba(35, 45, 72, 0.16);
        padding: clamp(14px, 3vw, 34px);
      }

      .setup-panel {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        gap: 32px;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(40px, 7vw, 76px);
        line-height: 1.02;
      }

      .lead,
      .form-help,
      .history-head span,
      .stats-grid span {
        color: #697286;
      }

      .input-row {
        display: flex;
        flex-wrap: wrap;
        align-items: stretch;
        gap: 10px;
      }

      .input-row input {
        flex: 1 1 180px;
        min-width: 0;
      }

      input,
      .input-row > button[type="submit"],
      .stepper-buttons button,
      .primary-button,
      .secondary-button {
        min-height: 56px;
        border-radius: 8px;
      }

      input {
        width: 100%;
        border: 1px solid #d9deea;
        padding: 0 16px;
        font-size: 20px;
        font-weight: 800;
      }

      .stepper-buttons {
        display: flex;
        flex: 0 0 92px;
        gap: 10px;
      }

      .stepper-buttons button {
        flex: 1;
        border: 1px solid #d9deea;
        background: #eef2f8;
      }

      .input-row > button[type="submit"],
      .primary-button {
        border: 0;
        padding: 0 18px;
        color: #fff;
        background: #1463ff;
        font-weight: 800;
      }

      .draw-panel {
        display: grid;
        gap: 16px;
      }

      .draw-surface {
        display: grid;
        min-height: clamp(330px, 52svh, 620px);
        place-items: center;
        align-content: center;
        gap: 12px;
        border: 0;
        border-radius: 8px;
        padding: clamp(18px, 5vw, 42px);
        color: #fff;
        background: linear-gradient(145deg, #17213a 0%, #234fbd 52%, #0e1940 100%);
        text-align: center;
      }

      .result-number {
        display: block;
        width: min(100%, 520px);
        font-size: clamp(88px, 24vw, 230px);
        font-weight: 900;
        line-height: 0.9;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .stats-grid div,
      .history-panel {
        padding: 14px;
      }

      .stats-grid strong {
        display: block;
        font-size: clamp(24px, 4vw, 36px);
      }

      .action-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .action-row button {
        flex: 1 1 180px;
      }

      .history-list {
        display: grid;
        gap: 8px;
        padding: 0;
        list-style: none;
      }

      .history-list li {
        display: flex;
        justify-content: space-between;
        border-radius: 8px;
        padding: 10px 12px;
        background: #f1f4fa;
      }

      .hidden {
        display: none;
      }

      @media (max-width: 820px) {
        .app-shell {
          grid-template-columns: 1fr;
          padding: 12px;
        }
      }

      @media (max-width: 520px) {
        .input-row {
          display: grid;
          grid-template-columns: minmax(0, 1fr) 92px;
        }

        .input-row > button[type="submit"] {
          grid-column: 1 / -1;
        }
      }
    </style>
  </head>
  <body>
    <main class="app-shell" aria-labelledby="app-title">
      <section class="setup-panel" aria-label="抽選の設定">
        <div>
          <p class="eyebrow">Random order</p>
          <h1 id="app-title">順番シャッフル</h1>
          <p class="lead">人数や番号の最大値を入れて、画面をタップするだけ。出た数字は重複しません。</p>
        </div>

        <form class="setup-form" id="setup-form" novalidate>
          <label for="max-number">最大の数字</label>
          <div class="input-row">
            <input
              id="max-number"
              name="max-number"
              type="number"
              inputmode="numeric"
              min="2"
              max="999"
              step="1"
              placeholder="例: 6"
              autocomplete="off"
              required
            />
            <div class="stepper-buttons" aria-label="最大の数字を上下する">
              <button type="button" data-step="1" aria-label="最大の数字を1増やす">▲</button>
              <button type="button" data-step="-1" aria-label="最大の数字を1減らす">▼</button>
            </div>
            <button type="submit">開始</button>
          </div>
          <p class="form-help" id="form-message" aria-live="polite">2〜999の整数を入力してください。</p>
        </form>
      </section>

      <section class="draw-panel" aria-label="抽選エリア">
        <button class="draw-surface" id="draw-surface" type="button" disabled>
          <span class="status-text" id="status-text">数字を入力して開始</span>
          <span class="result-number" id="result-number">--</span>
          <span class="tap-hint" id="tap-hint">開始すると、この大きなエリアをタップして抽選できます</span>
        </button>

        <div class="stats-grid" aria-label="抽選状況">
          <div>
            <span>残り</span>
            <strong id="remaining-count">0</strong>
          </div>
          <div>
            <span>表示済み</span>
            <strong id="drawn-count">0</strong>
          </div>
          <div>
            <span>最大値</span>
            <strong id="max-count">未設定</strong>
          </div>
        </div>

        <div class="action-row">
          <button class="secondary-button" id="reset-button" type="button" disabled>リセット</button>
          <button class="primary-button hidden" id="restart-button" type="button">もう一度はじめる</button>
        </div>

        <section class="history-panel" aria-labelledby="history-title">
          <div class="history-head">
            <h2 id="history-title">履歴</h2>
            <span id="history-summary">まだありません</span>
          </div>
          <ol class="history-list" id="history-list" aria-live="polite"></ol>
        </section>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
