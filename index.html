<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>順番シャッフル</title>
    <meta
      name="description"
      content="1から入力した数までを重複なくランダム表示する、順番決め用のシンプルなWebアプリです。"
    />
    <meta name="theme-color" content="#1463ff" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="順番シャッフル" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./assets/icon-192.png" sizes="192x192" />
    <link rel="apple-touch-icon" href="./assets/icon-192.png" />
    <link rel="stylesheet" href="./styles.css" />
    <style>
      body {
        margin: 0;
        min-width: 320px;
        color: #141821;
        background: #eef3fb;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      button,
      input {
        font: inherit;
      }

      .app-shell {
        display: grid;
        width: min(100%, 1180px);
        min-height: 100svh;
        grid-template-columns: minmax(280px, 0.72fr) minmax(0, 1fr);
        gap: clamp(18px, 4vw, 40px);
        margin: 0 auto;
        padding: clamp(16px, 4vw, 42px);
      }

      .setup-panel,
      .draw-panel,
      .history-panel,
      .stats-grid div {
        border: 1px solid #d9deea;
        border-radius: 8px;
        background: #fff;
      }

      .setup-panel,
      .draw-panel {
        box-shadow: 0 24px 70px rgba(35, 45, 72, 0.16);
        padding: clamp(14px, 3vw, 34px);
      }

      .setup-panel {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        gap: 32px;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(40px, 7vw, 76px);
        line-height: 1.02;
      }

      .lead,
      .form-help,
      .history-head span,
      .stats-grid span {
        color: #697286;
      }

      .title-row {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
      }

      .help-popover {
        position: relative;
      }

      .help-popover summary {
        display: grid;
        width: 38px;
        height: 38px;
        place-items: center;
        border: 1px solid #d9deea;
        border-radius: 50%;
        color: #1463ff;
        background: #fff;
        font-weight: 900;
        list-style: none;
      }

      .help-popover p {
        position: absolute;
        top: 46px;
        right: 0;
        z-index: 4;
        width: min(260px, calc(100vw - 32px));
        margin: 0;
        border: 1px solid #d9deea;
        border-radius: 8px;
        padding: 12px;
        background: #fff;
        box-shadow: 0 16px 40px rgba(35, 45, 72, 0.16);
        font-size: 13px;
        line-height: 1.6;
      }

      .input-row {
        display: flex;
        flex-wrap: wrap;
        align-items: stretch;
        gap: 10px;
      }

      .input-row input {
        flex: 1 1 180px;
        min-width: 0;
      }

      input,
      .input-row > button[type="submit"],
      .stepper-buttons button,
      .primary-button,
      .secondary-button {
        min-height: 56px;
        border-radius: 8px;
      }

      input {
        width: 100%;
        border: 1px solid #d9deea;
        padding: 0 16px;
        font-size: 20px;
        font-weight: 800;
      }

      .stepper-buttons {
        display: flex;
        flex: 0 0 92px;
        gap: 10px;
      }

      .stepper-buttons button {
        flex: 1;
        border: 1px solid #d9deea;
        background: #eef2f8;
      }

      .input-row > button[type="submit"],
      .primary-button {
        border: 0;
        padding: 0 18px;
        color: #fff;
        background: #1463ff;
        font-weight: 800;
      }

      .draw-panel {
        display: grid;
        gap: 16px;
      }

      .draw-surface {
        display: grid;
        min-height: clamp(330px, 52svh, 620px);
        place-items: center;
        align-content: center;
        gap: 12px;
        border: 0;
        border-radius: 8px;
        padding: clamp(18px, 5vw, 42px);
        color: #fff;
        background: linear-gradient(145deg, #17213a 0%, #234fbd 52%, #0e1940 100%);
        text-align: center;
      }

      .result-number {
        display: block;
        width: min(100%, 520px);
        font-size: clamp(88px, 24vw, 230px);
        font-weight: 900;
        line-height: 0.9;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .stats-grid div,
      .history-panel {
        padding: 14px;
      }

      .stats-grid strong {
        display: block;
        font-size: clamp(24px, 4vw, 36px);
      }

      .action-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .action-row button {
        flex: 1 1 180px;
      }

      .history-list {
        display: grid;
        gap: 8px;
        padding: 12px;
        list-style: none;
      }

      .history-head {
        cursor: pointer;
        list-style: none;
      }

      .history-list li {
        display: flex;
        justify-content: space-between;
        border-radius: 8px;
        padding: 10px 12px;
        background: #f1f4fa;
      }

      .hidden {
        display: none;
      }

      @media (max-width: 820px) {
        .app-shell {
          grid-template-columns: 1fr;
          padding: 12px;
        }
      }

      @media (max-width: 520px) {
        .app-shell {
          gap: 6px;
          padding: 6px;
        }

        .input-row {
          display: grid;
          grid-template-columns: minmax(0, 1fr) 74px;
          gap: 6px;
        }

        .input-row > button[type="submit"] {
          grid-column: 1 / -1;
        }

        h1 {
          margin-bottom: 0;
          font-size: 26px;
          line-height: 1;
        }

        .setup-panel,
        .draw-panel {
          padding: 8px;
        }

        .setup-panel,
        .draw-panel {
          gap: 6px;
        }

        .setup-form {
          gap: 5px;
        }

        input,
        .input-row > button[type="submit"],
        .stepper-buttons button,
        .primary-button,
        .secondary-button {
          min-height: 38px;
        }

        .stepper-buttons {
          flex-basis: 74px;
          width: 74px;
          gap: 6px;
        }

        .form-help {
          min-height: auto;
          font-size: 11px;
          line-height: 1.25;
        }

        .draw-surface {
          min-height: 170px;
          padding: 10px 8px;
          gap: 6px;
        }

        .result-number {
          font-size: clamp(68px, 27vw, 116px);
        }

        .stats-grid {
          gap: 4px;
        }

        .stats-grid div {
          padding: 6px;
        }

        .action-row {
          gap: 6px;
        }

        .history-head {
          padding: 8px 10px;
        }
      }

      .wheel-shell {
        position: relative;
        display: block;
        width: min(100%, 520px);
        min-height: 100svh;
        margin: 0 auto;
        padding: 0;
        overflow: hidden;
        background: #fff;
      }

      .wheel-shell .draw-panel {
        display: grid;
        min-height: 100svh;
        grid-template-rows: auto minmax(0, 1fr) auto auto;
        gap: 10px;
        border: 0;
        border-radius: 0;
        padding: 10px 14px 88px;
        background: #fff;
        box-shadow: none;
      }

      .top-bar {
        display: grid;
        grid-template-columns: 44px minmax(0, 1fr) 44px;
        gap: 8px;
        align-items: center;
      }

      .app-title-block {
        text-align: center;
      }

      .wheel-shell h1 {
        font-size: 22px;
      }

      .icon-button,
      .dock-button,
      .sheet-close {
        display: grid;
        place-items: center;
        border: 0;
        color: #1463ff;
        background: #f2f4f9;
        font-weight: 900;
      }

      .icon-button {
        width: 44px;
        height: 44px;
        border-radius: 50%;
      }

      .wheel-shell .draw-surface {
        min-height: 0;
        border-radius: 18px;
        background: #f8f9fd;
        color: #141821;
      }

      .wheel-shell .result-number {
        color: #111;
        font-size: clamp(96px, 34vw, 172px);
      }

      .bottom-dock {
        position: fixed;
        right: 12px;
        bottom: 14px;
        left: 12px;
        z-index: 8;
        display: grid;
        grid-template-columns: 58px minmax(0, 1fr) 58px;
        gap: 8px;
        max-width: 496px;
        margin: 0 auto;
      }

      .dock-button,
      .dock-reset,
      .bottom-dock .primary-button {
        min-height: 58px;
        border: 0;
        border-radius: 999px;
        color: #1463ff;
        background: #f2f4f9;
        font-weight: 900;
      }

      .sheet-panel {
        position: fixed;
        right: 12px;
        bottom: 84px;
        left: 12px;
        z-index: 10;
        max-width: 496px;
        max-height: min(58svh, 420px);
        margin: 0 auto;
        border: 1px solid #d9deea;
        border-radius: 18px;
        padding: 14px;
        overflow: auto;
        background: #fff;
        box-shadow: 0 20px 60px rgba(35, 45, 72, 0.2);
      }

      .sheet-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .sheet-close {
        width: 34px;
        height: 34px;
        border-radius: 50%;
      }
    </style>
  </head>
  <body>
    <main class="app-shell wheel-shell" aria-labelledby="app-title">
      <section class="draw-panel" aria-label="抽選エリア">
        <header class="top-bar">
          <button class="icon-button" id="settings-shortcut" type="button" aria-label="設定を開く">⚙</button>
          <div class="app-title-block">
            <p class="eyebrow">Random order</p>
            <h1 id="app-title">順番シャッフル</h1>
          </div>
          <button class="icon-button" id="help-toggle" type="button" aria-label="使い方を表示">?</button>
        </header>

        <button class="draw-surface" id="draw-surface" type="button" disabled>
          <span class="status-text" id="status-text">数字を入力して開始</span>
          <span class="result-number" id="result-number">--</span>
          <span class="tap-hint" id="tap-hint">右下の編集から最大値を設定</span>
        </button>

        <div class="stats-grid" aria-label="抽選状況">
          <div>
            <span>残り</span>
            <strong id="remaining-count">0</strong>
          </div>
          <div>
            <span>表示済み</span>
            <strong id="drawn-count">0</strong>
          </div>
          <div>
            <span>最大値</span>
            <strong id="max-count">未設定</strong>
          </div>
        </div>

        <div class="bottom-dock" aria-label="操作">
          <button class="dock-button" id="history-toggle" type="button" aria-label="履歴を開く">…</button>
          <button class="dock-reset" id="reset-button" type="button" disabled>リセット</button>
          <button class="dock-button" id="settings-toggle" type="button" aria-label="設定を開く">✎</button>
          <button class="primary-button hidden" id="restart-button" type="button">もう一度はじめる</button>
        </div>
      </section>

      <section class="sheet-panel hidden" id="settings-sheet" aria-labelledby="settings-title">
        <div class="sheet-head">
          <h2 id="settings-title">設定</h2>
          <button class="sheet-close" type="button" data-close-sheet="settings-sheet" aria-label="設定を閉じる">×</button>
        </div>
        <form class="setup-form" id="setup-form" novalidate>
          <label for="max-number">最大の数字</label>
          <div class="input-row">
            <input
              id="max-number"
              name="max-number"
              type="number"
              inputmode="numeric"
              min="2"
              max="999"
              step="1"
              placeholder="例: 6"
              autocomplete="off"
              required
            />
            <div class="stepper-buttons" aria-label="最大の数字を上下する">
              <button type="button" data-step="1" aria-label="最大の数字を1増やす">▲</button>
              <button type="button" data-step="-1" aria-label="最大の数字を1減らす">▼</button>
            </div>
            <button type="submit">開始</button>
          </div>
          <p class="form-help" id="form-message" aria-live="polite">2〜999の整数を入力してください。</p>
        </form>
      </section>

      <section class="sheet-panel hidden" id="history-sheet" aria-labelledby="history-title">
        <div class="sheet-head">
          <div>
            <h2 id="history-title">履歴</h2>
            <span id="history-summary">まだありません</span>
          </div>
          <button class="sheet-close" type="button" data-close-sheet="history-sheet" aria-label="履歴を閉じる">×</button>
        </div>
        <ol class="history-list" id="history-list" aria-live="polite"></ol>
      </section>

      <section class="sheet-panel hidden" id="help-sheet" aria-labelledby="help-title">
        <div class="sheet-head">
          <h2 id="help-title">使い方</h2>
          <button class="sheet-close" type="button" data-close-sheet="help-sheet" aria-label="使い方を閉じる">×</button>
        </div>
        <p class="sheet-copy">最大の数字を入れて開始。画面をタップするたび、未表示の数字から重複なく表示します。</p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
